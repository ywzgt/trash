name: linux
env:
  ACTION_KEY:  ${{ secrets.ACTION_KEY }}
on:
  workflow_dispatch:

jobs:
  runsh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: 32bit
        run: |
          uname -m
          uname -a
        shell: linux32 bash {0}

      - name: t1
        run: |
          echo "TAG_DES=Multilib LFS on x86_64 with i686 libraries, systemd" >> $GITHUB_ENV
          echo $GITHUB_ENV

      - name: t2
        run: |
          echo $TAG_DES
          echo -e '\n'
          echo $GITHUB_ENV
          exit 123

      - name: Run Script
        run: bash -e linux
