name: win
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Run Script
        run: |
          rem set PATH=C:\msys64\usr\bin;%PATH%
          set DEPOT_TOOLS_UPDATE=0
          set VPYTHON_BYPASS="manually managed python not supported by chrome operations"
          pip install httplib2 six auth >nul
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git
          echo .
          echo .
          mv py depot_tools
          rem python3 depot_tools\py
          rem python3 depot_tools\gclient.bat --help
          rem python3 depot_tools\gclient.bat sync --no-history -nohooks --verbose

          "C:\msys64\usr\bin\wget.exe" -c "https://chromium.googlesource.com/chromium/src/+archive/refs/tags/113.0.5672.116.tar.gz"
          md src
          tar xvf 113.0.5672.116.tar.gz -C src
          dir
          echo .
          dir src
        shell: cmd
