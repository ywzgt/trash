name: win
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Run Script
        run: |
          rem set PATH=C:\msys64\usr\bin;%PATH%
          rem which 7z
          curl -LO https://commondatastorage.googleapis.com/chromium-browser-official/chromium-113.0.5672.93.tar.xz
          7z x chromium-113.0.5672.93.tar.xz -oC:\
          cd /d c:
          7z x chromium-113.0.5672.93.tar -oout
          dir out
        shell: cmd
